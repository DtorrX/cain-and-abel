name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check wikinet tests scripts

      - name: Ruff format
        run: python -m ruff format --check wikinet tests scripts

      - name: Mypy
        run: python -m mypy wikinet

      - name: Pytest
        run: python -m pytest
